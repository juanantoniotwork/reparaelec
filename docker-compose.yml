services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: reparaelec_postgres
    environment:
      POSTGRES_DB: reparaelec
      POSTGRES_USER: reparaelec
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: reparaelec_redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: reparaelec_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend:/var/www/backend
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: reparaelec_php
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - postgres
      - redis

  queue:
    build:
      context: .
      dockerfile: Dockerfile.php
    container_name: reparaelec_queue
    command: php /var/www/backend/artisan queue:work --sleep=3 --tries=3 --timeout=120
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - postgres
      - redis

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
    container_name: reparaelec_nextjs
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/var/www/frontend
      - /var/www/frontend/node_modules
    depends_on:
      - php

volumes:
  postgres_data: